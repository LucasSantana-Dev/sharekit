name: Release

# Publishes to npm when a git tag matching v* is pushed.
# Requires NPM_TOKEN secret to be set in GitHub repository settings.
# The token should be an npm automation token (https://docs.npmjs.com/creating-and-viewing-authentication-tokens/).
# Alternatively, configure OIDC trusted publishing (https://docs.npmjs.com/using-npm/configure-npm-for-oidc-publishing)
# in npm and GitHub to avoid storing secrets.

on:
  push:
    tags:
      - v*

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
