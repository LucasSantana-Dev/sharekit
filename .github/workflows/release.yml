name: Release

# Publishes to npm via OIDC trusted publishing when a v* tag is pushed.
# No stored token: GitHub mints a short-lived OIDC credential that npm trusts,
# and provenance is attached automatically.
#
# ONE-TIME SETUP on npmjs.com (required before this can publish):
#   Package @lucassantana/sharekit -> Settings -> Trusted Publisher ->
#   GitHub Actions, with:
#     Organization/user:  LucasSantana-Dev
#     Repository:         sharekit
#     Workflow filename:  release.yml
#   Docs: https://docs.npmjs.com/trusted-publishers

on:
  push:
    tags:
      - v*

permissions:
  id-token: write # mint the OIDC token npm exchanges for publish auth
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest # trusted publishing needs npm >= 11.5.1
      - run: npm ci
      - run: npm run build
      - run: npm publish
