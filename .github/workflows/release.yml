name: Release

# Publishes to npm + PyPI via OIDC trusted publishing when a v* tag is pushed.
# Also builds native binaries and auto-updates the Homebrew tap.
# No stored tokens for npm/PyPI: GitHub mints short-lived OIDC credentials.
#
# ONE-TIME SETUP — npm:
#   npmjs.com → @lucassantana/sharekit → Settings → Trusted Publisher → GitHub Actions
#     Owner: LucasSantana-Dev  Repository: sharekit  Workflow: release.yml
#
# ONE-TIME SETUP — PyPI:
#   pypi.org → Publishing → Add a pending publisher
#     Project name: sharekit  Owner: LucasSantana-Dev  Repository: sharekit  Workflow: release.yml
#
# ONE-TIME SETUP — Homebrew tap:
#   1. Create github.com/LucasSantana-Dev/homebrew-tap (public repo)
#   2. Add Formula/sharekit.rb from docs/distribution/homebrew-formula.rb
#   3. Add secret HOMEBREW_TAP_TOKEN to this repo (sharekit):
#      Fine-grained PAT with Contents: write on homebrew-tap repo only.

on:
  push:
    tags:
      - v*

permissions:
  id-token: write # OIDC tokens for npm + PyPI trusted publishing
  contents: write # create GitHub Release and upload binary assets

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest # trusted publishing needs npm >= 11.5.1
      - run: npm ci
      - run: npm run build
      - run: npm publish

  publish-pip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build distribution
        run: |
          pip install build
          python -m build
        working-directory: sharekit-pip
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sharekit-pip/dist/

  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: npm ci
      - name: Build binaries
        run: |
          mkdir -p dist
          bun build --compile --target=bun-linux-x64    src/index.ts --outfile=dist/sharekit-linux-x64
          bun build --compile --target=bun-linux-arm64  src/index.ts --outfile=dist/sharekit-linux-arm64
          bun build --compile --target=bun-darwin-x64   src/index.ts --outfile=dist/sharekit-macos-x64
          bun build --compile --target=bun-darwin-arm64 src/index.ts --outfile=dist/sharekit-macos-arm64
          bun build --compile --target=bun-windows-x64  src/index.ts --outfile=dist/sharekit-windows-x64.exe
      - name: Create GitHub Release with binaries
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/sharekit-linux-x64
            dist/sharekit-linux-arm64
            dist/sharekit-macos-x64
            dist/sharekit-macos-arm64
            dist/sharekit-windows-x64.exe
          body: |
            ## Install

            **Homebrew:**
            ```bash
            brew install LucasSantana-Dev/tap/sharekit
            ```

            **pip / pipx:**
            ```bash
            pip install sharekit
            pipx install sharekit
            ```

            **npm:**
            ```bash
            npm install -g @lucassantana/sharekit
            ```

            **Direct download:**
            - [macOS ARM64](https://github.com/LucasSantana-Dev/sharekit/releases/download/${{ github.ref_name }}/sharekit-macos-arm64)
            - [macOS x64](https://github.com/LucasSantana-Dev/sharekit/releases/download/${{ github.ref_name }}/sharekit-macos-x64)
            - [Linux x64](https://github.com/LucasSantana-Dev/sharekit/releases/download/${{ github.ref_name }}/sharekit-linux-x64)
            - [Linux ARM64](https://github.com/LucasSantana-Dev/sharekit/releases/download/${{ github.ref_name }}/sharekit-linux-arm64)
            - [Windows x64](https://github.com/LucasSantana-Dev/sharekit/releases/download/${{ github.ref_name }}/sharekit-windows-x64.exe)
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-brew:
    needs: release # binaries must be uploaded before we can SHA them
    runs-on: ubuntu-latest
    if: ${{ secrets.HOMEBREW_TAP_TOKEN != '' }}
    steps:
      - name: Download binaries and compute SHA256
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BASE="https://github.com/LucasSantana-Dev/sharekit/releases/download/${GITHUB_REF_NAME}"
          mkdir -p /tmp/bins
          for NAME in macos-arm64 macos-x64 linux-arm64 linux-x64; do
            curl -fsSL "${BASE}/sharekit-${NAME}" -o "/tmp/bins/sharekit-${NAME}"
          done
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "SHA_MACOS_ARM64=$(sha256sum /tmp/bins/sharekit-macos-arm64 | cut -d' ' -f1)" >> $GITHUB_ENV
          echo "SHA_MACOS_X64=$(sha256sum /tmp/bins/sharekit-macos-x64   | cut -d' ' -f1)" >> $GITHUB_ENV
          echo "SHA_LINUX_ARM64=$(sha256sum /tmp/bins/sharekit-linux-arm64 | cut -d' ' -f1)" >> $GITHUB_ENV
          echo "SHA_LINUX_X64=$(sha256sum /tmp/bins/sharekit-linux-x64   | cut -d' ' -f1)" >> $GITHUB_ENV

      - name: Write updated formula
        run: |
          cat > /tmp/sharekit.rb << FORMULA
          class Sharekit < Formula
            desc "Share your AI coding setup — install profiles from GitHub with one command"
            homepage "https://github.com/LucasSantana-Dev/sharekit"
            license "MIT"
            version "${VERSION}"

            on_macos do
              on_arm do
                url "https://github.com/LucasSantana-Dev/sharekit/releases/download/v${VERSION}/sharekit-macos-arm64"
                sha256 "${SHA_MACOS_ARM64}"
              end
              on_intel do
                url "https://github.com/LucasSantana-Dev/sharekit/releases/download/v${VERSION}/sharekit-macos-x64"
                sha256 "${SHA_MACOS_X64}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/LucasSantana-Dev/sharekit/releases/download/v${VERSION}/sharekit-linux-arm64"
                sha256 "${SHA_LINUX_ARM64}"
              end
              on_intel do
                url "https://github.com/LucasSantana-Dev/sharekit/releases/download/v${VERSION}/sharekit-linux-x64"
                sha256 "${SHA_LINUX_X64}"
              end
            end

            def install
              bin.install stable.url.split("/").last => "sharekit"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/sharekit --version")
            end
          end
          FORMULA

      - name: Push formula to homebrew-tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/LucasSantana-Dev/homebrew-tap.git" /tmp/tap
          cp /tmp/sharekit.rb /tmp/tap/Formula/sharekit.rb
          cd /tmp/tap
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add Formula/sharekit.rb
          git commit -m "chore: bump sharekit to v${VERSION}"
          git push
