name: Release

# Publishes to npm + PyPI via OIDC trusted publishing when a v* tag is pushed.
# No stored tokens: GitHub mints short-lived OIDC credentials each registry trusts.
#
# ONE-TIME SETUP — npm (required before first npm publish):
#   npmjs.com → @lucassantana/sharekit → Settings → Trusted Publisher → GitHub Actions
#     Organization/user:  LucasSantana-Dev
#     Repository:         sharekit
#     Workflow filename:  release.yml
#   Docs: https://docs.npmjs.com/trusted-publishers
#
# ONE-TIME SETUP — PyPI (required before first pip publish):
#   pypi.org → Publishing → Add a pending publisher
#     PyPI project name:  sharekit
#     Owner:              LucasSantana-Dev
#     Repository:         sharekit
#     Workflow filename:  release.yml
#     Environment:        (leave blank)
#   Docs: https://docs.pypi.org/trusted-publishers/adding-a-publisher/

on:
  push:
    tags:
      - v*

permissions:
  id-token: write # OIDC tokens for npm + PyPI trusted publishing
  contents: write # create GitHub Release and upload binary assets

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest # trusted publishing needs npm >= 11.5.1
      - run: npm ci
      - run: npm run build
      - run: npm publish

  publish-pip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build distribution
        run: |
          pip install build
          python -m build
        working-directory: sharekit-pip
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sharekit-pip/dist/

  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: npm ci # install deps for build context
      - name: Build binaries
        run: |
          mkdir -p dist
          bun build --compile --target=bun-linux-x64 src/index.ts --outfile=dist/sharekit-linux-x64
          bun build --compile --target=bun-linux-arm64 src/index.ts --outfile=dist/sharekit-linux-arm64
          bun build --compile --target=bun-darwin-x64 src/index.ts --outfile=dist/sharekit-macos-x64
          bun build --compile --target=bun-darwin-arm64 src/index.ts --outfile=dist/sharekit-macos-arm64
          bun build --compile --target=bun-windows-x64 src/index.ts --outfile=dist/sharekit-windows-x64.exe
      - name: Create release with binaries
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/sharekit-linux-x64
            dist/sharekit-linux-arm64
            dist/sharekit-macos-x64
            dist/sharekit-macos-arm64
            dist/sharekit-windows-x64.exe
          body: |
            ## Install

            **Direct download:**
            - [Linux x64](https://github.com/LucasSantana-Dev/sharekit/releases/download/${{ github.ref_name }}/sharekit-linux-x64)
            - [Linux ARM64](https://github.com/LucasSantana-Dev/sharekit/releases/download/${{ github.ref_name }}/sharekit-linux-arm64)
            - [macOS x64](https://github.com/LucasSantana-Dev/sharekit/releases/download/${{ github.ref_name }}/sharekit-macos-x64)
            - [macOS ARM64](https://github.com/LucasSantana-Dev/sharekit/releases/download/${{ github.ref_name }}/sharekit-macos-arm64)
            - [Windows x64](https://github.com/LucasSantana-Dev/sharekit/releases/download/${{ github.ref_name }}/sharekit-windows-x64.exe)

            **Via npm:**
            ```bash
            npm install -g @lucassantana/sharekit
            ```

            **Via pip:**
            ```bash
            pip install sharekit
            pipx install sharekit
            ```

            **Via Homebrew:** Coming soon
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
